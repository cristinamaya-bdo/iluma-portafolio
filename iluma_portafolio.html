/* ------- MEDIA QUERIES RESPONSIVE (AGREGA ESTO AL FINAL DEL STYLE) ------- */
@media (max-width: 900px) {
  main {
    padding: 16px 10px;
    max-width: 100%;
  }
  .cards-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .toolbar,
  .sel-row {
    flex-direction: column;
    gap: 10px;
  }
  .criterios-grid,
  .ficha-body {
    grid-template-columns: 1fr;
    gap: 12px;
  }
}

@media (max-width: 600px) {
  header {
    flex-direction: column;
    height: auto;
    padding: 12px 8px;
    gap: 8px;
    align-items: flex-start;
  }
  .logo {
    gap: 5px;
  }
  .logo-mark {
    width: 25px;
    height: 25px;
    font-size: 9px;
    border-radius: 5px;
  }
  .logo-name {
    font-size: 13px;
  }
  .logo-sub {
    font-size: 9px;
  }
  .nav-tabs {
    gap: 1px;
    flex-wrap: wrap;
  }
  .nav-tab {
    padding: 6px 7px;
    font-size: 12px;
  }
  .stats {
    gap: 6px;
    flex-wrap: wrap;
  }
  .card {
    padding: 10px 8px;
  }
  .expand-inner {
    padding: 12px 8px;
  }
  .ficha-wrap, .table-wrap, .hist-wrap {
    border-radius: 8px;
  }
  .ficha-body, .criterios-grid {
    gap: 7px;
  }
  .ficha-footer {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }
  .prog-bar {
    width: 100%;
    max-width: 120px;
  }
  .sel-row {
    gap: 8px;
    flex-direction: column;
  }
  .modal {
    max-width: 95vw;
    padding: 0;
  }
  .modal-body, .modal-header {
    padding: 14px 7px;
  }
}
